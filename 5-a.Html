<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Color Methods</title>
    <style>
        .name { color: red; }
        .hex { color: #008000; }
        .rgb { color: rgb(0, 0, 255); }
        .rgba { color: rgba(255, 0, 0, 0.5); }
        .hsl { color: hsl(300, 100%, 40%); }
    </style>
</head>
<body>

    <h2 class="name">Telugu</h2>
    <h2 class="hex">Hindi</h2>
    <h2 class="rgb">English</h2>
    <h2 class="rgba">Maths</h2>
    <h2 class="hsl">Science</h2>

</body>
</html>
