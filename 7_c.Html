<!DOCTYPE html>
<html>
<body>

<h3>Array Object Example</h3>

<script>
var fruits = ["Apple", "Mango", "Banana", "Mango"];

document.write("Array length: " + fruits.length + "<br>");

fruits.push("Grapes");
fruits.pop();
fruits.sort();

document.write("Array elements: " + fruits);
</script>

</body>
</html>
