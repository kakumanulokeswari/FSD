<!DOCTYPE html>
<html>
<body>
<h3>String Object Example</h3>
<script>
var text = "JavaScript";
document.write("Length of string: " + text.length + "<br>");
document.write("Upper case: " + text.toUpperCase() + "<br>");
document.write("Lower case: " + text.toLowerCase() + "<br>");
document.write("Character at position 2: " + text.charAt(2));
</script>

</body>
</html>
