<!DOCTYPE html>
<html>
<head>
<title>CSS Box Model Demonstration</title>

<style>
.box {
  width: 300px;
  padding: 20px;          /* Space inside border */
  border: 5px solid black;/* Border */
  margin: 40px;           /* Space outside border */
  background-color: lightblue; /* Content area */
}
</style>

</head>
<body>

<h2>CSS Box Model (Content, Padding, Border, Margin)</h2>

<div class="box">
  This area represents the content.
  Padding is the space inside the border.
  Border surrounds the padding.
  Margin is the space outside the border.
</div>

</body>
</html>
