<!DOCTYPE html>
<html>
<head>
<title>Larger Number Program</title>

<script>
function findLargest() {

    // Get numbers from user
    let num1 = parseInt(prompt("Enter first integer:"));
    let num2 = parseInt(prompt("Enter second integer:"));
    let num3 = parseInt(prompt("Enter third integer:"));

    // Check if all numbers are equal
    if (num1 === num2 && num2 === num3) {
        alert("EQUAL NUMBERS");
    }
    else {
        // Find the largest number
        let largest = num1;

        if (num2 > largest) {
            largest = num2;
        }

        if (num3 > largest) {
            largest = num3;
        }

        alert(largest + " LARGER NUMBER");
    }
}
</script>

</head>

<body onload="findLargest()">
</body>
</html>
