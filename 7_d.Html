<!DOCTYPE html>
<html>
<body>
<h3>Math Object Example</h3>
<script>
document.write("Value of PI: " + Math.PI + "<br>");
document.write("Square root of 36: " + Math.sqrt(36) + "<br>");
document.write("Random number: " + Math.random() + "<br>");
document.write("Maximum value: " + Math.max(10,20,30));
</script>
</body>
</html>
