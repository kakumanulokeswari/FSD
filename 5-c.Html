<!DOCTYPE html>
<html>
<head>
    <title>CSS Font and Text Properties</title>
    <style>
        .size {
            font-size: 30px;
        }

        .weight {
            font-weight: bold;
        }

        .style {
            font-style: italic;
        }

        .decoration {
            text-decoration: underline;
        }

        .transform {
            text-transform: uppercase;
        }

        .align {
            text-align: center;
            border: 1px solid black;
        }
    </style>
</head>
<body>

    <h2 class="size">This text shows font-size property</h2>

    <h2 class="weight">This text shows font-weight property</h2>

    <h2 class="style">This text shows font-style property</h2>

    <h2 class="decoration">This text shows text-decoration property</h2>

    <h2 class="transform">This text shows text-transform property</h2>

    <h2 class="align">This text shows text-align property</h2>

</body>
</html>
